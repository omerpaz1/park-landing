server {
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Public quote view ───────────────────────────────────────────────────
    # /q/config.js is generated at runtime so the static page can call the
    # backend at the right origin without baking the URL into the bundle.
    # BACKEND_API_URL must be set in the deployment environment (e.g. Railway)
    # to the backend's public URL, e.g. https://api.buildingpark.co.il.
    location = /q/config.js {
        default_type application/javascript;
        add_header Cache-Control "no-store" always;
        return 200 "window.BUILDINGPARK_API='${BACKEND_API_URL}';";
    }

    # All /q/<token> URLs serve the same SPA-ish quote.html. The token is
    # parsed from window.location.pathname client-side.
    location /q/ {
        try_files $uri /quote.html;
        add_header Cache-Control "no-store" always;
    }

    # ── Public lead-intake form ─────────────────────────────────────────────
    # Same envsubst pattern as /q. Reuses BACKEND_API_URL (single backend).
    location = /lead/config.js {
        default_type application/javascript;
        add_header Cache-Control "no-store" always;
        return 200 "window.BUILDINGPARK_API='${BACKEND_API_URL}';";
    }

    # ── Join Android (Google Play signup) ──────────────────────────────────
    # Same envsubst pattern as /q and /lead. Reuses BACKEND_API_URL.
    # The page itself is `join-android.html` and serves as the public
    # landing for residents getting onboarded onto the Android app.
    location = /join-android/config.js {
        default_type application/javascript;
        add_header Cache-Control "no-store" always;
        return 200 "window.BUILDINGPARK_API='${BACKEND_API_URL}';";
    }
    location = /join-android {
        try_files /join-android.html =404;
        add_header Cache-Control "no-store" always;
    }
    location /join-android/ {
        try_files $uri /join-android.html;
        add_header Cache-Control "no-store" always;
    }

    # Backward-compat: anyone with the old `/become-tester` link gets
    # 301'd to the new URL (preserves any query string we'd add later).
    # Safe to remove once we're sure no flyer / WhatsApp share is still
    # circulating with the old path (give it a few months).
    location = /become-tester {
        return 301 /join-android;
    }
    location /become-tester/ {
        return 301 /join-android;
    }

    # ── Account deletion (Google Play / Apple Store compliance) ─────────────
    # Public, OTP-gated page declared in our Play Store Data Safety form.
    # Same envsubst pattern as the other public flows.
    location = /delete-account/config.js {
        default_type application/javascript;
        add_header Cache-Control "no-store" always;
        return 200 "window.BUILDINGPARK_API='${BACKEND_API_URL}';";
    }
    location = /delete-account {
        try_files /delete-account.html =404;
        add_header Cache-Control "no-store" always;
    }
    location /delete-account/ {
        try_files $uri /delete-account.html;
        add_header Cache-Control "no-store" always;
    }

    # /lead and any nested path (future: /lead/instagram, /lead/google)
    # all serve the same form. UTM params are read from the query string.
    location = /lead {
        try_files /lead.html =404;
        add_header Cache-Control "no-store" always;
    }
    location /lead/ {
        try_files $uri /lead.html;
        add_header Cache-Control "no-store" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    # text/html is gzipped by nginx by default; listing it here causes a
    # harmless but noisy "duplicate MIME type" warning at boot.
    gzip_types text/css application/javascript image/svg+xml;
    gzip_min_length 256;
}
